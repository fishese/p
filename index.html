<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My HTML Files</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 600px; margin: auto; }
        ul { line-height: 1.8; }
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>Available Pages</h1>
    <ul id="file-list">
        <li>Loading files...</li>
    </ul>

    <script>
        // --- CONFIGURE THESE ---
        const owner = 'fishese';
        const repo = 'p';
        const path = ''; // Leave blank for the root directory, or add a folder name like 'pages'
        // -----------------------

        const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) throw new Error("Could not fetch repo contents.");
                return response.json();
            })
            .then(data => {
                const list = document.getElementById('file-list');
                list.innerHTML = ''; // Clear loading text

                data.forEach(file => {
                    // Only list .html files and exclude the index itself
                    if (file.name.endsWith('.html') && file.name !== 'index.html') {
                        const li = document.createElement('li');
                        const a = document.createElement('a');
                        a.href = file.name;
                        a.textContent = file.name.replace('.html', ''); // Removes .html from the display text
                        li.appendChild(a);
                        list.appendChild(li);
                    }
                });

                if (list.innerHTML === '') {
                    list.innerHTML = '<li>No HTML files found.</li>';
                }
            })
            .catch(error => {
                document.getElementById('file-list').innerHTML = `<li>Error loading files. Ensure the repo is public.</li>`;
                console.error(error);
            });
    </script>
</body>
</html>
