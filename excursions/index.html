<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cruise Strategy Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Smooth transitions for interactive elements */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-20 md:pb-28">

    <div id="app"></div>

    <script>
        // --- Port Data with Local Image Filenames ---
        const ports = [
            {
                id: 'aberdeen',
                name: 'Aberdeen, Scotland',
                defaultChoice: 'excursion',
                excursion: {
                    code: 'ABE-002',
                    title: 'The Castle and the Coast',
                    price: 119,
                    image: 'aberdeen-excursion.jpg',
                    whyExcursion: 'Dunnottar Castle is a dramatic ruin perched on a sheer cliff—an absolute must-see. Reaching it independently involves navigating sparse bus timetables and a steep hike.',
                    whyThisOne: 'Focuses entirely on the stunning coastal scenery rather than the city center, matching your desire for "only-found-in-this-place" scenic views.'
                },
                diy: {
                    title: 'Granite City Wander',
                    image: 'aberdeen-diy.jpg',
                    whyDiy: 'While Aberdeen is walkable, the true natural majesty lies outside the city limits. Staying in port means missing the dramatic cliffside landscapes you are looking for.',
                    highlights: 'Walk to the maritime museum or grab a coffee near the harbor.'
                }
            },
            {
                id: 'kirkwall',
                name: 'Kirkwall (Orkneys), Scotland',
                defaultChoice: 'excursion',
                excursion: {
                    code: 'KOI-001',
                    title: 'Ancient Treasures of Orkney',
                    price: 149,
                    image: 'kirkwall-excursion.jpg',
                    whyExcursion: 'The highlights—Skara Brae and the Standing Stones—are spread out across the island. The public bus network is not built for cruise ship schedules.',
                    whyThisOne: 'This is the quintessential Orkney experience. It bundles all the UNESCO World Heritage sites into one seamless trip without risking missing the ship.'
                },
                diy: {
                    title: 'Kirkwall Town Stroll',
                    image: 'kirkwall-diy.jpg',
                    whyDiy: 'Kirkwall is a lovely, tiny town with a beautiful cathedral, but you can walk the entire town in about an hour. You would miss the island\'s world-famous ancient history.',
                    highlights: 'St. Magnus Cathedral and local craft shops.'
                }
            },
            {
                id: 'stornoway',
                name: 'Stornoway (Hebrides), Scotland',
                defaultChoice: 'excursion',
                excursion: {
                    code: 'SYY-002',
                    title: 'Scenic Lewis',
                    price: 139,
                    image: 'stornoway-excursion.jpg',
                    whyExcursion: 'The Outer Hebrides are breathtakingly wild, but infrastructure is minimal. Getting to the mystical Calanais Standing Stones requires booking a private cab months in advance.',
                    whyThisOne: 'Drives you straight into the stark, stunning moorlands and ancient history of the island, safely returning you to the ship with zero logistical headaches.'
                },
                diy: {
                    title: 'Lews Castle Walk',
                    image: 'stornoway-diy.jpg',
                    whyDiy: 'Stornoway town is small. You can walk to Lews Castle grounds from the pier for a relaxing hour, but misses the dramatic, rugged scenery the Hebrides are famous for.',
                    highlights: 'Lews Castle gardens and harbor views.'
                }
            },
            {
                id: 'killybegs',
                name: 'Killybegs, Ireland',
                defaultChoice: 'excursion',
                excursion: {
                    code: 'K1L-002',
                    title: 'The Wild Sliabh Liag Cliffs',
                    price: 159,
                    image: 'killybegs-excursion.jpg',
                    whyExcursion: 'The Sliabh Liag cliffs are among Europe\'s highest, but they are incredibly remote. There is no direct public bus from the port to the cliff edges.',
                    whyThisOne: 'Takes you to a pristine, isolated landscape offering some of the most dramatic views in Ireland. A perfect "only-found-here" moment without driving narrow roads.'
                },
                diy: {
                    title: 'Killybegs Fishing Village',
                    image: 'killybegs-diy.jpg',
                    whyDiy: 'It is a quaint village, but primarily an industrial fishing hub. It lacks the sweeping landscapes that you sailed to this part of Ireland to see.',
                    highlights: 'Local seafood shacks near the working harbor.'
                }
            },
            {
                id: 'belfast',
                name: 'Belfast, Northern Ireland',
                defaultChoice: 'diy',
                excursion: {
                    code: 'BFS-008',
                    title: 'Spectacular Giants Causeway',
                    price: 279,
                    image: 'belfast-excursion.jpg',
                    whyExcursion: 'The Causeway is iconic, but it is a long 6-hour round trip on a bus. This eats up your entire day in Belfast.',
                    whyThisOne: 'If you absolutely must see the geometric basalt columns, this is the safest way to do it, but it is a heavy commitment of time and funds.'
                },
                diy: {
                    title: 'Cathedral Quarter & Titanic Slipways',
                    image: 'belfast-diy.jpg',
                    whyDiy: 'Belfast is incredibly flat and walkable. Take a 10-minute cab to City Hall and instantly be in the action. No need to sit on a bus when you can wander historic cobblestone alleys.',
                    highlights: 'Grab a "Belfast Bap" at St. George\'s Market or explore the independent cafes in the Cathedral Quarter.'
                }
            },
            {
                id: 'dublin',
                name: 'Dublin (Dun Laoghaire), Ireland',
                defaultChoice: 'diy',
                excursion: {
                    code: 'DLG-006',
                    title: 'Drive Through Countryside',
                    price: 309,
                    image: 'dublin-excursion.jpg',
                    whyExcursion: 'Takes you out of the city into the Wicklow mountains and Glendalough.',
                    whyThisOne: 'Beautiful, but very expensive and means you miss the vibrant, relaxing café culture of Dublin entirely.'
                },
                diy: {
                    title: 'DART Train to Trinity College',
                    image: 'dublin-diy.jpg',
                    whyDiy: 'You dock in Dun Laoghaire, which has a commuter train (DART) station literally right on the pier. For a few Euros, it drops you directly into central Dublin in 25 minutes.',
                    highlights: 'Visit Bread 41 for artisan pastries, wander Trinity College, and enjoy the creative quarter at your own leisure.'
                }
            },
            {
                id: 'cork',
                name: 'Cork (Cobh), Ireland',
                defaultChoice: 'diy',
                excursion: {
                    code: 'CBH-005',
                    title: 'Cork\'s Countryside & Kinsale',
                    price: 149,
                    image: 'cork-excursion.jpg',
                    whyExcursion: 'Kinsale is a famously colorful, historic sailing town and the food capital of Ireland. Reaching it by public transit from Cobh requires a train and a bus transfer.',
                    whyThisOne: 'An excellent option if you want to skip the city entirely and see rural West Cork. *Hint: The perfect 5th excursion to trigger your package discount!*'
                },
                diy: {
                    title: 'Train to Cork & The English Market',
                    image: 'cork-diy.jpg',
                    whyDiy: 'The Cobh train station is practically attached to your cruise pier. A scenic 25-minute train ride drops you in Cork city center. It gives you ultimate freedom.',
                    highlights: 'The English Market is an absolute must for foodies. Meander through artisan cheese and fresh breads under an 18th-century roof.'
                }
            },
            {
                id: 'dartmouth',
                name: 'Dartmouth, UK',
                defaultChoice: 'diy',
                excursion: {
                    code: 'DTH-003',
                    title: 'River Cruise & Totnes',
                    price: 149,
                    image: 'dartmouth-excursion.jpg',
                    whyExcursion: 'Totnes is an ancient, quirky town famous for its eco-conscious, local-artisan vibe. The river cruise up the Dart is beautiful.',
                    whyThisOne: 'A relaxing scenic glide past Agatha Christie\'s estate and into one of England\'s most unique historic towns.'
                },
                diy: {
                    title: 'Historic Embankment & Cream Tea',
                    image: 'dartmouth-diy.jpg',
                    whyDiy: 'You step off the tender directly into the heart of a stunning 17th-century naval town. It is picture-perfect, flat along the river, and designed for slow, relaxing walks.',
                    highlights: 'Walk to Dartmouth Castle at the mouth of the river, then reward yourselves with a proper Devonshire Cream Tea.'
                }
            }
        ];

        // --- State Management ---
        let selections = {};
        ports.forEach(p => { selections[p.id] = p.defaultChoice; });
        const shoreCredit = 300;

        function toggleSelection(portId, choice) {
            selections[portId] = choice;
            render();
        }

        function handleImageError(imgElement, isExcursion) {
            imgElement.style.display = 'none';
            const fallback = imgElement.nextElementSibling;
            fallback.style.display = 'flex';
        }

        // --- Render Function ---
        function render() {
            const selectedExcursions = ports.filter(p => selections[p.id] === 'excursion');
            const excursionCount = selectedExcursions.length;
            const subtotal = selectedExcursions.reduce((sum, p) => sum + p.excursion.price, 0);
            
            const isDiscountApplied = excursionCount >= 5;
            const discountAmount = isDiscountApplied ? subtotal * 0.25 : 0;
            const finalTotal = subtotal - discountAmount;
            const outOfPocket = Math.max(0, finalTotal - shoreCredit);
            const remainingCredit = Math.max(0, shoreCredit - finalTotal);

            const appDiv = document.getElementById('app');
            
            appDiv.innerHTML = `
                <div class="max-w-6xl mx-auto p-4 md:p-8 space-y-6 md:space-y-8">
                    
                    <!-- Header -->
                    <header class="bg-white rounded-2xl shadow-sm p-6 md:p-10 border border-slate-100">
                        <div class="flex items-center gap-4 mb-4">
                            <div class="p-3 bg-teal-100 text-teal-700 rounded-xl">
                                <i data-lucide="ship" class="w-8 h-8"></i>
                            </div>
                            <h1 class="text-2xl md:text-4xl font-bold text-slate-900">The "Out of Office" Strategy</h1>
                        </div>
                        <p class="text-base md:text-lg text-slate-600 leading-relaxed max-w-3xl">
                            As two professionals looking to de-stress, the goal is to eliminate logistical headaches. 
                            We use your coworker's <strong>$300 Shore Credit</strong> to buy convenience in remote, rugged areas, and rely on 
                            easy, scenic local transit for cities where you want the freedom to sip coffee and wander at your own pace.
                        </p>
                    </header>

                    <!-- Strategy Hack Banner -->
                    ${excursionCount === 4 ? `
                    <div class="bg-gradient-to-r from-amber-100 to-orange-100 border border-amber-300 rounded-xl p-5 shadow-sm fade-in">
                        <div class="flex items-center gap-3 text-amber-900 font-bold mb-2 text-lg">
                            <i data-lucide="sparkles" class="text-amber-600 w-6 h-6"></i>
                            THE 5-EXCURSION DISCOUNT HACK!
                        </div>
                        <p class="text-amber-900 leading-relaxed text-sm md:text-base">
                            You have exactly 4 excursions selected. The cruise offers a <strong>25% discount</strong> if you book 5. 
                            Right now, your total out-of-pocket is <strong>$${outOfPocket.toFixed(2)}</strong>. 
                            If you add the $149 Cork or Dartmouth excursion, your massive 25% discount kicks in across the ENTIRE package, 
                            dropping your out-of-pocket cost to <strong>$${(outOfPocket - 29.75).toFixed(2)}</strong>. 
                        </p>
                    </div>
                    ` : ''}

                    <!-- Main Content Grid -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
                        
                        <!-- Left Column: Itinerary Builder -->
                        <div class="lg:col-span-2 space-y-6">
                            <h2 class="text-xl md:text-2xl font-bold flex items-center gap-2 mb-2 md:mb-4">
                                <i data-lucide="map-pin" class="text-teal-600 w-6 h-6"></i> Interactive Itinerary Builder
                            </h2>
                            
                            ${ports.map(port => {
                                const isExcursion = selections[port.id] === 'excursion';
                                const activeData = isExcursion ? port.excursion : port.diy;
                                
                                return `
                                <div class="rounded-2xl border transition-all duration-300 overflow-hidden shadow-sm ${isExcursion ? 'border-teal-400 bg-teal-50/20' : 'border-indigo-300 bg-indigo-50/20'}">
                                    
                                    <!-- Port Header & Toggles -->
                                    <div class="p-4 border-b border-slate-200/50 flex flex-col md:flex-row md:items-center justify-between gap-3 md:gap-4 bg-white/90">
                                        <h3 class="text-lg md:text-xl font-bold text-slate-800 leading-tight">${port.name}</h3>
                                        <div class="flex bg-slate-100 rounded-lg p-1 shadow-inner shrink-0">
                                            <button 
                                                onclick="toggleSelection('${port.id}', 'diy')"
                                                class="flex-1 flex items-center justify-center gap-2 px-3 py-2 text-xs md:text-sm font-semibold rounded-md transition-all ${!isExcursion ? 'bg-white shadow-sm text-indigo-700' : 'text-slate-500 hover:text-slate-700'}"
                                            >
                                                <i data-lucide="footprints" class="w-4 h-4"></i> DIY Free
                                            </button>
                                            <button 
                                                onclick="toggleSelection('${port.id}', 'excursion')"
                                                class="flex-1 flex items-center justify-center gap-2 px-3 py-2 text-xs md:text-sm font-semibold rounded-md transition-all ${isExcursion ? 'bg-teal-600 shadow-sm text-white' : 'text-slate-500 hover:text-slate-700'}"
                                            >
                                                <i data-lucide="ship" class="w-4 h-4"></i> Excursion ($${port.excursion.price})
                                            </button>
                                        </div>
                                    </div>

                                    <!-- Content Area with Photo -->
                                    <div class="flex flex-col sm:flex-row">
                                        <!-- Photo Container -->
                                        <div class="w-full sm:w-2/5 h-40 sm:h-auto relative bg-slate-100 border-b sm:border-b-0 sm:border-r border-slate-200/50 shrink-0 overflow-hidden">
                                            <img 
                                                src="${activeData.image}" 
                                                alt="${activeData.title}"
                                                onerror="handleImageError(this, ${isExcursion})"
                                                class="absolute inset-0 w-full h-full object-cover transition-opacity duration-500"
                                            />
                                            <div style="display: none;" class="absolute inset-0 flex-col items-center justify-center ${isExcursion ? 'bg-teal-50 text-teal-300' : 'bg-indigo-50 text-indigo-300'}">
                                                <i data-lucide="camera-off" class="w-8 h-8 mb-2"></i>
                                                <span class="text-xs font-medium">Image unavailable</span>
                                            </div>
                                            <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 via-transparent to-transparent flex items-end p-3">
                                                <span class="text-white font-medium flex items-center gap-1.5 text-xs shadow-sm drop-shadow-md">
                                                    <i data-lucide="image" class="w-3.5 h-3.5"></i> ${isExcursion ? 'Excursion View' : 'DIY View'}
                                                </span>
                                            </div>
                                        </div>
                                        
                                        <!-- Text Details -->
                                        <div class="w-full sm:w-3/5 p-4 md:p-5 bg-white/60">
                                            ${isExcursion ? `
                                            <div class="space-y-3 fade-in">
                                                <div class="flex items-start gap-2.5">
                                                    <i data-lucide="check-circle-2" class="text-teal-600 mt-0.5 shrink-0 w-[18px] h-[18px]"></i>
                                                    <div>
                                                        <h4 class="font-bold text-teal-900 text-sm md:text-base leading-tight">${port.excursion.code}: ${port.excursion.title}</h4>
                                                        <p class="text-slate-700 mt-1.5 text-xs md:text-sm leading-relaxed">${port.excursion.whyThisOne}</p>
                                                    </div>
                                                </div>
                                                <div class="bg-white p-3 md:p-4 rounded-xl border border-teal-100 shadow-sm">
                                                    <h5 class="font-semibold text-slate-800 mb-1 flex items-center gap-1.5 text-xs md:text-sm">
                                                        <i data-lucide="alert-triangle" class="text-amber-500 w-3.5 h-3.5"></i> Defense: Why pay for this?
                                                    </h5>
                                                    <p class="text-xs md:text-sm text-slate-600 leading-relaxed">${port.excursion.whyExcursion}</p>
                                                </div>
                                            </div>
                                            ` : `
                                            <div class="space-y-3 fade-in">
                                                <div class="flex items-start gap-2.5">
                                                    <i data-lucide="coffee" class="text-indigo-600 mt-0.5 shrink-0 w-[18px] h-[18px]"></i>
                                                    <div>
                                                        <h4 class="font-bold text-indigo-900 text-sm md:text-base leading-tight">${port.diy.title}</h4>
                                                        <p class="text-slate-700 mt-1.5 text-xs md:text-sm leading-relaxed">${port.diy.highlights}</p>
                                                    </div>
                                                </div>
                                                <div class="bg-white p-3 md:p-4 rounded-xl border border-indigo-100 shadow-sm">
                                                    <h5 class="font-semibold text-slate-800 mb-1 flex items-center gap-1.5 text-xs md:text-sm">
                                                        <i data-lucide="sparkles" class="text-indigo-400 w-3.5 h-3.5"></i> Defense: Why DIY here?
                                                    </h5>
                                                    <p class="text-xs md:text-sm text-slate-600 leading-relaxed">${port.diy.whyDiy}</p>
                                                </div>
                                            </div>
                                            `}
                                        </div>
                                    </div>
                                </div>
                                `;
                            }).join('')}
                        </div>

                        <!-- Right Column: Detailed Calculator (Hidden on Mobile) -->
                        <div class="hidden lg:block lg:col-span-1">
                            <div class="sticky top-8 space-y-6">
                                
                                <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                                    <div class="bg-slate-900 text-white p-6">
                                        <h2 class="text-xl font-bold flex items-center gap-2">
                                            <i data-lucide="credit-card" class="w-6 h-6"></i> Detailed Breakdown
                                        </h2>
                                        <p class="text-slate-300 text-sm mt-1">Per Person with $300 Credit</p>
                                    </div>
                                    
                                    <div class="p-6 space-y-6">
                                        <!-- Progress Bar -->
                                        <div>
                                            <div class="flex justify-between text-sm font-semibold mb-2">
                                                <span class="text-slate-600">Your World Collection Package</span>
                                                <span class="${isDiscountApplied ? 'text-teal-600 font-bold' : 'text-slate-500'}">
                                                    ${excursionCount}/5 Selected
                                                </span>
                                            </div>
                                            <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden">
                                                <div 
                                                    class="h-full transition-all duration-500 ${isDiscountApplied ? 'bg-teal-500' : 'bg-amber-400'}"
                                                    style="width: ${Math.min(100, (excursionCount / 5) * 100)}%"
                                                ></div>
                                            </div>
                                            ${isDiscountApplied ? `
                                            <p class="text-xs text-teal-600 mt-2 font-medium flex items-center gap-1">
                                                <i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i> 25% Discount Unlocked!
                                            </p>
                                            ` : `
                                            <p class="text-xs text-slate-500 mt-2">
                                                Add ${5 - excursionCount} more to unlock 25% off all excursions.
                                            </p>
                                            `}
                                        </div>

                                        <hr class="border-slate-100" />

                                        <!-- Math -->
                                        <div class="space-y-3 text-sm">
                                            <div class="flex justify-between text-slate-600">
                                                <span>Excursions Subtotal</span>
                                                <span>$${subtotal.toFixed(2)}</span>
                                            </div>
                                            ${isDiscountApplied ? `
                                            <div class="flex justify-between text-teal-600 font-medium">
                                                <span>Package Discount (25%)</span>
                                                <span>-$${discountAmount.toFixed(2)}</span>
                                            </div>
                                            ` : ''}
                                            <div class="flex justify-between text-slate-800 font-bold pt-2 border-t border-slate-100">
                                                <span>Total Excursion Cost</span>
                                                <span>$${finalTotal.toFixed(2)}</span>
                                            </div>
                                            <div class="flex justify-between text-indigo-600 font-medium">
                                                <span>Shore Credit Applied</span>
                                                <span>-$${Math.min(shoreCredit, finalTotal).toFixed(2)}</span>
                                            </div>
                                        </div>

                                        <!-- Final Output -->
                                        <div class="p-4 rounded-xl ${outOfPocket > 0 ? 'bg-rose-50 border border-rose-100' : 'bg-teal-50 border border-teal-100'}">
                                            <div class="flex justify-between items-center">
                                                <span class="font-bold text-slate-800">Final Out of Pocket:</span>
                                                <span class="text-2xl font-black ${outOfPocket > 0 ? 'text-rose-600' : 'text-teal-600'}">
                                                    $${outOfPocket.toFixed(2)}
                                                </span>
                                            </div>
                                            ${remainingCredit > 0 ? `
                                            <p class="text-sm font-semibold text-teal-700 mt-2 text-right">
                                                $${remainingCredit.toFixed(2)} credit remaining!
                                            </p>
                                            ` : ''}
                                        </div>
                                    </div>
                                </div>

                                <!-- Info Note -->
                                <div class="bg-slate-100 rounded-xl p-4 text-xs text-slate-500 flex items-start gap-2 shadow-inner">
                                    <i data-lucide="info" class="shrink-0 text-slate-400 w-5 h-5"></i>
                                    <p>DIY options assume minor costs for local transit (like DART or local trains) which are usually $5-$15 per person and paid directly at the station via tap-to-pay.</p>
                                </div>

                            </div>
                        </div>

                    </div>
                </div>

                <!-- EXTREMELY COMPACT STICKY BOTTOM BAR -->
                <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-200 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-50">
                    
                    <!-- Desktop View -->
                    <div class="hidden md:flex max-w-6xl mx-auto px-6 py-3 items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center ${isDiscountApplied ? 'bg-teal-100 text-teal-600' : 'bg-amber-100 text-amber-600'}">
                                <i data-lucide="${isDiscountApplied ? 'check-circle-2' : 'sparkles'}" class="w-[18px] h-[18px]"></i>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-slate-800 leading-tight">${excursionCount} Excursions Selected</p>
                                <p class="text-[11px] uppercase tracking-wide ${isDiscountApplied ? 'text-teal-600 font-bold' : 'text-slate-500'}">
                                    ${isDiscountApplied ? '25% Discount Active' : `${5 - excursionCount} more for 25% off`}
                                </p>
                            </div>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="text-right border-r border-slate-200 pr-6">
                                <p class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Credit Limit</p>
                                <p class="text-sm font-bold text-indigo-600">$300.00</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Total Out of Pocket</p>
                                <p class="text-2xl leading-none font-black ${outOfPocket > 0 ? 'text-rose-600' : 'text-teal-600'}">
                                    $${outOfPocket.toFixed(2)}
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- Ultra-Compact Mobile View -->
                    <div class="flex md:hidden px-4 py-2 items-center justify-between">
                        <div class="flex flex-col justify-center">
                            <div class="flex items-center gap-1.5">
                                <span class="text-sm font-extrabold text-slate-900">${excursionCount}/5</span>
                                ${isDiscountApplied ? `
                                <span class="text-[10px] font-bold text-teal-700 bg-teal-100 px-1.5 py-0.5 rounded-md">25% OFF</span>
                                ` : `
                                <span class="text-[10px] font-medium text-slate-500 uppercase tracking-wide">Selected</span>
                                `}
                            </div>
                            <span class="text-[10px] text-slate-500 font-medium leading-none mt-1">
                                Using $${Math.min(shoreCredit, finalTotal).toFixed(0)} Credit
                            </span>
                        </div>
                        <div class="flex flex-col items-end justify-center">
                            <span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider leading-none mb-1">Out of Pocket</span>
                            <span class="text-xl font-black leading-none ${outOfPocket > 0 ? 'text-rose-600' : 'text-teal-600'}">
                                $${outOfPocket.toFixed(2)}
                            </span>
                        </div>
                    </div>

                </div>
            `;

            // Initialize Lucide icons on newly rendered HTML
            lucide.createIcons();
        }

        // Initial render
        render();
    </script>
</body>
</html>
