    <style>
        /* Smooth transitions for interactive elements */
        .fade-in { animation: fadeIn 0.2s ease-out; }
        .zoom-in-95 { animation: zoomIn 0.2s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- PRINT FRIENDLY CSS --- */
        @media print {
            body { background: white !important; color: black !important; padding-bottom: 0 !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .port-card { 
                page-break-inside: avoid; 
                border: 1px solid #ccc !important; 
                box-shadow: none !important; 
                margin-bottom: 2rem !important; 
                background: white !important;
            }
            .bg-slate-900, .bg-teal-600, .bg-indigo-600 { background: #f1f5f9 !important; color: black !important; border: 1px solid #cbd5e1 !important; }
            .text-white { color: black !important; }
            img { display: none !important; } /* Hide images to save ink */
            #app { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
        }
    </style>

        // --- State Management ---
        let selections = {};
        ports.forEach(p => { selections[p.id] = p.defaultChoice; });
        const shoreCredit = 300;
        let activeModalPort = null;
        let showPrepModal = false;

        function toggleSelection(event, portId, choice) {
            const cardElement = event ? event.target.closest('.port-card') : null;
            let previousTop = 0;
            if (cardElement) {
                previousTop = cardElement.getBoundingClientRect().top;
            }

            selections[portId] = choice;
            render();

            if (cardElement) {
                const newCardElement = document.getElementById(`card-${portId}`);
                if (newCardElement) {
                    const currentTop = newCardElement.getBoundingClientRect().top;
                    window.scrollBy(0, currentTop - previousTop);
                }
            }
        }

        function openModal(portId) {
            activeModalPort = portId;
            document.body.style.overflow = 'hidden';
            render();
        }

        function closeModal() {
            activeModalPort = null;
            document.body.style.overflow = 'auto';
            render();
        }

        function togglePrepModal() {
            showPrepModal = !showPrepModal;
            document.body.style.overflow = showPrepModal ? 'hidden' : 'auto';
            render();
        }

        function handleImageError(imgElement) {
            imgElement.style.display = 'none';
            const fallback = imgElement.nextElementSibling;
            if (fallback) fallback.style.display = 'flex';
        }

        // --- Render Function ---
        function render() {
            const selectedExcursions = ports.filter(p => selections[p.id] === 'excursion');
            const excursionCount = selectedExcursions.length;
            const subtotal = selectedExcursions.reduce((sum, p) => sum + p.excursion.price, 0);
            
            const isDiscountApplied = excursionCount >= 5;
            const discountAmount = isDiscountApplied ? subtotal * 0.25 : 0;
            const finalTotal = subtotal - discountAmount;
            const outOfPocket = Math.max(0, finalTotal - shoreCredit);
            const remainingCredit = Math.max(0, shoreCredit - finalTotal);

            // Modal HTML Logic
            let modalHtml = '';
            if (showPrepModal) {
                modalHtml = `
                <div class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-in fade-in duration-200">
                    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden relative zoom-in-95">
                        <div class="bg-slate-900 text-white p-5 flex justify-between items-center">
                            <h2 class="text-xl font-bold flex items-center gap-2">
                                <i data-lucide="check-square" class="text-teal-400"></i> Pre-Trip Checklist
                            </h2>
                            <button onclick="togglePrepModal()" class="text-slate-400 hover:text-white transition-colors bg-slate-800 p-2 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        <div class="p-6 space-y-5 bg-slate-50">
                            <div class="flex gap-4">
                                <i data-lucide="wifi-off" class="w-6 h-6 text-indigo-600 shrink-0"></i>
                                <div>
                                    <h4 class="font-bold text-slate-800 mb-1">Offline Google Maps</h4>
                                    <p class="text-sm text-slate-600">Cell service drops in rural Scotland and Ireland. Download the map areas for all 9 ports in the Google Maps app before you leave home.</p>
                                </div>
                            </div>
                            <div class="flex gap-4">
                                <i data-lucide="credit-card" class="w-6 h-6 text-teal-600 shrink-0"></i>
                                <div>
                                    <h4 class="font-bold text-slate-800 mb-1">Contactless Payments</h4>
                                    <p class="text-sm text-slate-600">Set up Apple Pay or Google Pay. 95% of transit, pubs, and shops use contactless tap-to-pay. You barely need physical £ or € cash.</p>
                                </div>
                            </div>
                            <div class="flex gap-4">
                                <i data-lucide="cloud-rain" class="w-6 h-6 text-blue-600 shrink-0"></i>
                                <div>
                                    <h4 class="font-bold text-slate-800 mb-1">Layering Strategy</h4>
                                    <p class="text-sm text-slate-600">May weather changes hourly. Always carry a high-quality waterproof shell jacket. Expect bright sun and sudden downpours on the same day.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            } else if (activeModalPort) {
                const portData = ports.find(p => p.id === activeModalPort);
